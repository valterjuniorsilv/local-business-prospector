name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check src/ --output-format=github || true
      - name: Check Python syntax
        run: |
          for f in src/*.py; do
            python -m py_compile "$f" || exit 1
          done
          echo "All Python files compile."
